name: Electron build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/boost
          df -h

      - name: Free up disk space (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # The CUDA torch wheel is ~2.5 GB. Windows runners ship with ~14 GB
          # free; clearing the Android SDK and chocolatey caches gives us back
          # enough headroom for the PyInstaller bundle.
          Remove-Item -Recurse -Force "$env:ANDROID_HOME" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\dotnet\sdk\NuGetFallbackFolder" -ErrorAction SilentlyContinue
          Get-PSDrive C

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      # openai-whisper builds from sdist and its setup.py imports pkg_resources,
      # which setuptools >=81 no longer ships. Pin setuptools in pip's isolated
      # build env via PIP_CONSTRAINT so the wheel build can find pkg_resources.
      - name: Write pip build constraints
        shell: bash
        run: |
          echo "setuptools<81" > "$GITHUB_WORKSPACE/pip-constraints.txt"
          echo "PIP_CONSTRAINT=$GITHUB_WORKSPACE/pip-constraints.txt" >> "$GITHUB_ENV"

      - name: Install Python deps (Windows + Linux, CUDA 12.6 wheels)
        if: matrix.os != 'macos-latest'
        run: |
          python -m pip install --upgrade pip
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cu126
          pip install -r backend/requirements.txt
          pip install pyinstaller
        shell: bash

      - name: Install Python deps (macOS, MPS via default wheels)
        if: matrix.os == 'macos-latest'
        run: |
          python -m pip install --upgrade pip
          pip install torch torchaudio
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Install npm deps
        run: |
          npm ci
          npm --prefix frontend ci

      - name: Type-check frontend
        run: npm --prefix frontend run build

      - name: Type-check electron
        run: npm run build:electron

      - name: Download ffmpeg (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force electron/resources/ffmpeg/win | Out-Null
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-extract
          Copy-Item -Path "ffmpeg-extract/*/bin/ffmpeg.exe" -Destination electron/resources/ffmpeg/win/

      - name: Download ffmpeg (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p electron/resources/ffmpeg/mac
          curl -L -o ffmpeg.zip "https://evermeet.cx/ffmpeg/getrelease/zip"
          unzip ffmpeg.zip -d electron/resources/ffmpeg/mac

      - name: Download ffmpeg (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p electron/resources/ffmpeg/linux
          curl -L -o ffmpeg.tar.xz "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz"
          tar -xJf ffmpeg.tar.xz -C electron/resources/ffmpeg/linux --strip-components=1 --wildcards '*/ffmpeg'

      - name: Build backend bundle (PyInstaller)
        run: npm run build:backend

      - name: Build frontend
        run: npm run build:frontend

      - name: Build electron main
        run: npm run build:electron

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing skipped in CI; add APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD secrets to enable.

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: captionaut-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.zip
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/latest*.yml
          if-no-files-found: warn
          retention-days: 14

      - name: Attach to release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.zip
            release/*.dmg
            release/*.AppImage
            release/*.deb
