name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-win-${{ hashFiles('backend/requirements.txt') }}

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip "setuptools<81"
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Download FFmpeg (Windows)
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-tmp
          New-Item -ItemType Directory -Force resources/win
          Copy-Item (Get-ChildItem ffmpeg-tmp -Recurse -Filter ffmpeg.exe).FullName resources/win/
          Copy-Item (Get-ChildItem ffmpeg-tmp -Recurse -Filter ffprobe.exe).FullName resources/win/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node root deps
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build PyInstaller sidecar
        run: python -m PyInstaller captionaut.spec --distpath dist --workpath build/pyinstaller --noconfirm

      - name: Compile Electron TypeScript
        run: npm run electron:compile

      - name: Build Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: captionaut-windows
          path: release/*.exe

  build-mac:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-mac-${{ hashFiles('backend/requirements.txt') }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip "setuptools<81"
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Download FFmpeg (macOS)
        run: |
          curl -L "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip" -o ffmpeg.zip
          unzip ffmpeg.zip -d ffmpeg-tmp
          mkdir -p resources/mac
          cp ffmpeg-tmp/ffmpeg resources/mac/
          chmod +x resources/mac/ffmpeg

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node root deps
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build PyInstaller sidecar
        run: python -m PyInstaller captionaut.spec --distpath dist --workpath build/pyinstaller --noconfirm

      - name: Compile Electron TypeScript
        run: npm run electron:compile

      - name: Build macOS DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --publish always

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: captionaut-mac
          path: release/*.dmg
