services:
  backend:
    build: .
    image: captionaut-backend
    ports:
      - "8010:8010"
    environment:
      # Optional: pyannote HuggingFace token. Without it, diarization is disabled.
      # Set HF_TOKEN in a .env file next to this docker-compose.yml.
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - captionaut-data:/data
      - whisper-cache:/root/.cache/whisper
      - hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  captionaut-data:
  whisper-cache:
  hf-cache:
