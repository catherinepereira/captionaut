services:
  captionaut:
    build: .
    image: captionaut:latest
    container_name: captionaut
    ports:
      # Bound to localhost so the API is not reachable via LAN.
      - "127.0.0.1:8200:8200"
    environment:
      # Optional. Without it diarization is disabled in the UI.
      # Put HF_TOKEN=hf_... in a .env file next to this compose file.
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      # User data: uploads, rendered outputs, denoised audio cache.
      - captionaut-data:/data
      # Whisper model cache (~145 MB for base, larger for medium/large).
      - whisper-cache:/root/.cache/whisper
      # HuggingFace cache: pyannote models + Demucs weights when downloaded.
      - hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  captionaut-data:
  whisper-cache:
  hf-cache:
